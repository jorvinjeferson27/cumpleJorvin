<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎉 Cumpleaños de Jorvin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0d0d1a;
color:white;
overflow-x:hidden;
}

/* fondo partículas */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* luces disco */

.disco{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,transparent,rgba(255,0,150,0.2));
animation:lights 5s infinite alternate;
pointer-events:none;
}

@keyframes lights{
0%{background:radial-gradient(circle,transparent,rgba(255,0,150,0.2));}
50%{background:radial-gradient(circle,transparent,rgba(0,150,255,0.2));}
100%{background:radial-gradient(circle,transparent,rgba(0,255,150,0.2));}
}

/* intro pantalla */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
text-align:center;
}

#intro h1{
font-size:60px;
margin-bottom:30px;
background:linear-gradient(45deg,#e9d5dc,#00e0ff);
-webkit-background-clip:text;
color:transparent;
}

#intro button{
padding:15px 40px;
border:none;
border-radius:30px;
background:#146e8a;
color:white;
font-size:20px;
cursor:pointer;
transition:.3s;
}

#intro button:hover{
transform:scale(1.1);
}

/* contenido principal */

.container{
max-width:900px;
margin:auto;
padding:80px 20px;
text-align:center;
display:none;
}


.title{
font-size:60px;
margin-bottom:20px;
background:linear-gradient(45deg,#ff2e7a,#00e0ff);
-webkit-background-clip:text;
color:transparent;
}


.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
margin:40px 0;
box-shadow:0 0 40px rgba(0,0,0,0.5);
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
}


.countdown{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.time{
background:#111;
padding:20px;
border-radius:15px;
font-size:22px;
min-width:100px;
}


button{
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff2e7a;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
margin-top:20px;
}

button:hover{
transform:scale(1.1);
}


.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:15px;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.08);
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

@media (max-width:768px){

.title{
font-size:40px;
}

#intro h1{
font-size:40px;
}

.countdown{
gap:10px;
}

.time{
min-width:70px;
font-size:18px;
padding:15px;
}

.container{
padding:40px 15px;
}

.card{
padding:25px;
}

.gallery{
grid-template-columns:repeat(2,1fr);
}

}

@media (max-width:480px){

.title{
font-size:32px;
}

.gallery{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div id="particles-js"></div>
<div class="disco"></div>


<div id="intro">
<h1>🎉 Invitación 🎉</h1>
<button onclick="abrir()">Abrir invitación</button>
</div>



<div class="container">

<h1 class="title">CUMPLEAÑOS JORVIN</h1>

<div class="card">
<p>📅 <b>25 de Marzo</b></p>
<p>⏰ <b>4:00 PM</b></p>
</div>

<div class="card">

<h2>Cuenta regresiva</h2>

<div class="countdown">
<div class="time"><span id="days">0</span><br>Días</div>
<div class="time"><span id="hours">0</span><br>Horas</div>
<div class="time"><span id="minutes">0</span><br>Min</div>
<div class="time"><span id="seconds">0</span><br>Seg</div>
</div>

<button onclick="confirmar()">📲 Confirmar asistencia</button>

</div>

<div class="card">

<h2>🎧</h2>

<iframe 
style="border-radius:15px"
src="https://open.spotify.com/embed/playlist/1atnK0GXG71jhcZlAgFiXC?utm_source=generator"
width="100%" 
height="380" 
frameBorder="0" 
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

</div>

<div class="card">

<h2>Fotos</h2>

<div class="gallery">
<img src="https://images.pexels.com/photos/8274070/pexels-photo-8274070.jpeg">
<img src="https://images.pexels.com/photos/256502/pexels-photo-256502.jpeg">
<img src="fotos/img01.jpg">
<img src="fotos/img04.jpg">
</div>

</div>

<div class="card">

<h2>Ubicación 📍</h2>

<iframe
src="https://www.google.com/maps?q=-8.1149939,-79.0102968&z=18&output=embed"
width="100%"
height="300"
style="border:0;border-radius:15px;"
loading="lazy">
</iframe>

</div>

</div>

<script>

function abrir(){

document.getElementById("intro").style.display="none";
document.querySelector(".container").style.display="block";

lanzarConfetti();

/* autoplay spotify */

let player=document.getElementById("spotifyPlayer");
player.src=player.src+"?autoplay=1";

}

/* cuenta regresiva */

const eventDate=new Date("2026-03-25T15:00:00").getTime();

setInterval(()=>{

const now=new Date().getTime();
const diff=eventDate-now;

const d=Math.floor(diff/(1000*60*60*24));
const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((diff%(1000*60*60))/(1000*60));
const s=Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerText=d;
document.getElementById("hours").innerText=h;
document.getElementById("minutes").innerText=m;
document.getElementById("seconds").innerText=s;

},1000)

/* whatsapp */

function confirmar(){

window.open("https://wa.me/51948202563?text=Confirmo%20mi%20asistencia%20al%20cumpleaños%20de%20Jorvin%20🎉");

}

/* confetti */

function lanzarConfetti(){

setInterval(()=>{

for(let i=0;i<10;i++){

let confetti=document.createElement("div");
confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";
confetti.style.background=`hsl(${Math.random()*360},100%,50%)`;
confetti.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(confetti);

setTimeout(()=>confetti.remove(),5000);

}

},500)

}

/* partículas */

particlesJS("particles-js",{

particles:{
number:{value:80},
size:{value:3},
move:{speed:2}
}

})

</script>

</body>
</html>
